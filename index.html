<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title student - Register, Login, Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app">
        <!-- Auth Container (Login/Register) -->
        <div id="auth-container">
            <div class="header">
                <h1>📚 student  </h1>
                <p>Register or Login </p>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">🔐 Login</button>
                <button class="tab" onclick="switchTab('register')">📝 Register</button>
            </div>
            <div class="form-container">
                <!-- Login Form -->
                <div id="login-form" class="form active">
                    <div class="input-group">
                        <label>📧 Email</label>
                        <input type="email" id="login-email" placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label>🔒 Password</label>
                        <input type="password" id="login-password" placeholder="Password (6+ characters)">
                    </div>
                    <button class="btn" onclick="login()">Login</button>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="form">
                    <div class="input-group">
                        <label>👤 Full Name</label>
                        <input type="text" id="reg-name" placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label>📧 Email</label>
                        <input type="email" id="reg-email" placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label>🔒 Password</label>
                        <input type="password" id="reg-password" placeholder="At least 6 characters">
                    </div>
                    <button class="btn" onclick="register()">Create Account</button>
                </div>

                <div id="message"></div>
            </div>
            <div class="footer">
                <p>🔐 Secure Authentication | Firebase</p>
            </div>
        </div>

        <!-- Dashboard Container (After Login) -->
        <div id="dashboard-container" style="display: none;">
            <div class="header">
                <h1>📖 Welcome Back!</h1>
                <p>Barnaayitaa keessan</p>
            </div>
            <div class="dashboard">
                <div class="user-avatar" id="user-avatar">👤</div>
                <h2 id="welcome-name">Welcome!</h2>
                <div class="user-info">
                    <p><strong>📧 Email:</strong> <span id="user-email"></span></p>
                    <p><strong>🆔 User ID:</strong> <span id="user-id"></span></p>
                    <p><strong>📅 Joined:</strong> <span id="user-since"></span></p>
                </div>
                <button class="btn logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
            <div class="footer">
                <p>✅ You are logged in</p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
